name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy buscore site with Price Guard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: Price-Guard/package-lock.json

      - name: Install Price Guard dependencies
        working-directory: Price-Guard
        run: npm ci

      - name: Build Price Guard
        working-directory: Price-Guard
        run: npm run build

      - name: Stage deploy artifact
        run: |
          mkdir -p .deploy/priceguard
          rsync -a \
            --exclude='.git' \
            --exclude='Price-Guard' \
            --exclude='scripts' \
            --exclude='.deploy' \
            --exclude='node_modules' \
            . .deploy/
          cp -r Price-Guard/dist/. .deploy/priceguard/

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
